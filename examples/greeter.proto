syntax = "proto3";

package greeter.v1;

// A small service exercising every RPC cardinality.
service Greeter {
  // Unary -> served over Fetch by the client.
  rpc SayHello(HelloRequest) returns (HelloReply);
  // Server streaming -> served over WebSocket.
  rpc Countdown(CountdownRequest) returns (stream Tick);
  // Bidi streaming -> served over WebSocket.
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}

message CountdownRequest {
  uint32 from = 1;
}

message Tick {
  uint32 value = 1;
}

message ChatMessage {
  string text = 1;
}
