syntax = "proto3";

package echo.v1;

service Echo {
  // Unary: returns the same message.
  rpc Unary(EchoRequest) returns (EchoResponse);
  // Bidi streaming: echoes each message back.
  rpc Stream(stream EchoRequest) returns (stream EchoResponse);
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}
